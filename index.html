<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Camera Premium</title>
    <style>
        /* ── CSS RESET & HYBRID WEBVIEW OPTIMIZATIONS ── */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-user-select: none; 
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body {
            background: #0d0d0d; 
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            overflow: hidden;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }

        .camera-body {
            background: linear-gradient(160deg, #242424, #161616);
            border: 2px solid #2e2e2e; 
            border-radius: 20px;
            padding: 12px 12px 10px;
            box-shadow: inset 0 0 14px #000, 0 16px 40px rgba(0,0,0,0.9);
            width: 100%; 
            max-width: 420px; 
            height: 97vh;
            display: flex; 
            flex-direction: column; 
            gap: 7px;
        }

        /* ── Top bar ── */
        .top-bar { display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .led-display {
            background:#000; color:#ff3333; font-size:12px;
            padding:4px 9px; border-radius:4px; font-weight:bold;
            border:1px solid #1e1e1e; box-shadow:inset 0 0 5px #ff000055; letter-spacing:1px;
        }
        .film-name { font-size:10px; color:#ffaa00; letter-spacing:1.5px; text-transform:uppercase; max-width:160px; text-align:right; line-height:1.3; font-weight: bold;}

        /* ── Mode bar ── */
        .mode-bar { display:flex; gap:5px; justify-content:center; flex-shrink:0; }
        .mode-btn {
            font-size:10px; padding:5px 11px; border-radius:20px; cursor:pointer;
            border:1.5px solid #333; background:#161616; color:#666;
            letter-spacing:0.5px; transition:all 0.15s; display:flex; align-items:center; gap:4px;
            min-height: 36px;
        }
        .mode-btn.active { border-color:#ffaa00; color:#ffaa00; background:#1e1800; }
        .mode-btn svg { width:12px; height:12px; display: block; }

        /* ── Viewfinder ── */
        .viewfinder {
            flex:1; border:2px solid #111; background:#0a0a0a;
            position:relative; overflow:hidden; border-radius:8px; min-height:0;
            touch-action:none;
        }
        #webcam { width:100%; height:100%; object-fit:cover; display:block; }
        #webcam.mirrored { transform:scaleX(-1); }
        #preview { display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2; }
        #flash-overlay { position:absolute; inset:0; background:white; opacity:0; z-index:10; pointer-events:none; }

        /* Corner brackets */
        .viewfinder::before,.viewfinder::after,.vf-br::before,.vf-br::after {
            content:''; position:absolute; width:18px; height:18px;
            border-color:rgba(255,255,255,0.3); border-style:solid; z-index:5;
        }
        .viewfinder::before { top:8px; left:8px; border-width:2px 0 0 2px; }
        .viewfinder::after  { top:8px; right:8px; border-width:2px 2px 0 0; }
        .vf-br::before { bottom:8px; left:8px; border-width:0 0 2px 2px; }
        .vf-br::after  { bottom:8px; right:8px; border-width:0 2px 2px 0; }

        /* Grid overlay */
        #grid-overlay { position:absolute; inset:0; z-index:4; pointer-events:none; display:none; }
        #grid-overlay.show { display:block; }
        .gl { position:absolute; background:rgba(255,255,255,0.2); }
        .gl.h { left:0; right:0; height:1px; }
        .gl.v { top:0; bottom:0; width:1px; }

        /* Timer overlay */
        #timer-overlay {
            position:absolute; inset:0; z-index:20; display:none;
            align-items:center; justify-content:center; background:rgba(0,0,0,0.4);
        }
        #timer-overlay.show { display:flex; }
        #timer-number {
            font-size:96px; font-weight:bold; color:#fff;
            text-shadow:0 0 30px rgba(255,170,0,0.9);
            animation:pulse 1s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

        /* ── Zoom bar ── */
        .zoom-bar { flex-shrink:0; display:flex; align-items:center; gap:8px; padding:0 2px; }
        .zoom-label { font-size:10px; color:#666; width:34px; text-align:right; letter-spacing:1px; }
        #zoom-slider {
            flex:1; -webkit-appearance:none; appearance:none; height:3px; border-radius:2px;
            background:linear-gradient(to right, #ffaa00 var(--pct,0%), #333 var(--pct,0%));
            outline:none;
        }
        #zoom-slider::-webkit-slider-thumb {
            -webkit-appearance:none; width:16px; height:16px;
            border-radius:50%; background:#ffaa00; border:2px solid #fff; cursor:pointer;
        }
        .zoom-btn {
            background:#1e1e1e; border:1.5px solid #333; color:#888;
            width:28px; height:28px; border-radius:50%;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .zoom-btn:active { background:#2a2a2a; color:#fff; }
        .zoom-btn svg { width:12px; height:12px; fill:currentColor; }

        /* ── Filter strip ── */
        .filter-strip {
            flex-shrink:0; display:flex; gap:6px;
            overflow-x:auto; padding:2px 0 4px; scrollbar-width:none;
            min-height: 64px; /* Giữ khung luôn cố định diện tích */
        }
        .filter-strip::-webkit-scrollbar { display:none; }
        .filter-btn {
            flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:4px;
            cursor:pointer; padding:4px 5px; border-radius:8px;
            border:1.5px solid transparent; background:#1a1a1a; min-width:54px;
            transition:border-color 0.15s;
        }
        .filter-btn.active { border-color:#ffaa00; background:#1e1800; }
        .filter-thumb { width:40px; height:40px; border-radius:5px; overflow:hidden; background:#222; position:relative; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        .filter-thumb canvas { width:100%; height:100%; display:block; }
        .filter-label { font-size:8px; color:#666; text-align:center; font-weight:bold; }
        .filter-btn.active .filter-label { color:#ffaa00; }

        /* ── Bottom bar ── */
        .bottom-bar {
            flex-shrink:0; display:flex; align-items:center;
            justify-content:space-between; padding:0 4px;
        }

        .btn-flip, .btn-gallery {
            width:48px; height:48px; border-radius:50%;
            background:#1e1e1e; border:1.5px solid #333;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:background 0.1s; position:relative;
        }
        .btn-flip:active, .btn-gallery:active { background:#2a2a2a; }
        .btn-flip svg, .btn-gallery svg { width:22px; height:22px; }

        /* Shutter button */
        .shutter-btn {
            width:68px; height:68px; border-radius:50%; cursor:pointer;
            background:radial-gradient(circle at 38% 35%, #f0f0f0, #c0c0c0);
            border:3px solid #888;
            box-shadow:0 0 0 4px #2a2a2a, 0 6px 0 #555, 0 10px 18px rgba(0,0,0,0.6);
            transition:all 0.1s;
            display:flex; align-items:center; justify-content:center;
        }
        .shutter-btn:active {
            box-shadow:0 0 0 4px #2a2a2a, 0 2px 0 #555, 0 4px 8px rgba(0,0,0,0.6);
            transform:translateY(4px);
        }
        .shutter-btn:disabled { opacity:0.4; transform:none; }
        .shutter-dot {
            width:16px; height:16px; border-radius:50%;
            background:radial-gradient(circle at 38% 35%, #ff6655, #cc1100);
            box-shadow:0 0 6px rgba(200,0,0,0.5);
        }

        .gallery-badge {
            position:absolute; top:-4px; right:-4px;
            background:#ff3333; color:#fff; font-size:9px; font-weight:bold;
            width:17px; height:17px; border-radius:50%;
            display:none; align-items:center; justify-content:center;
        }

        #status {
            font-size:10px; color:#555; text-align:center;
            flex-shrink:0; letter-spacing:1px; min-height:14px;
        }

        /* ══ PREMIUM OVERLAYS ══ */
        #gallery-overlay { display:none; position:fixed; inset:0; background:#000; z-index:100; flex-direction:column; }
        #gallery-overlay.open { display:flex; }
        .gallery-header { 
            display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; border-bottom:1px solid #1e1e1e;
            padding-top: calc(env(safe-area-inset-top, 0px) + 14px);
        }
        .gallery-title { font-size:13px; color:#ffaa00; letter-spacing:2px; font-weight:bold; }
        .gallery-close { background:#1e1e1e; border:1px solid #333; color:#fff; width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .gallery-close svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.5; }
        
        .gallery-grid { flex:1; overflow-y:auto; padding:8px; display:grid; grid-template-columns:repeat(3,1fr); gap:3px; }
        .gallery-thumb { aspect-ratio:1; overflow:hidden; cursor:pointer; border-radius:3px; position:relative; background:#111; }
        .gallery-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
        .gallery-thumb .thumb-idx { position:absolute; bottom:3px; right:4px; font-size:8px; color:rgba(255,255,255,0.5); }

        /* ══ PHOTO VIEWER ══ */
        #photo-viewer { display:none; position:fixed; inset:0; background:#000; z-index:200; flex-direction:column; align-items:center; justify-content:center; }
        #photo-viewer.open { display:flex; }
        #viewer-img { max-width:100%; max-height:calc(100vh - 80px); object-fit:contain; border-radius:4px; }
        .viewer-bar { 
            position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; 
            padding:12px 16px calc(env(safe-area-inset-bottom, 0px) + 12px); 
            background:linear-gradient(transparent,rgba(0,0,0,0.8)); 
        }
        .viewer-btn { 
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; 
            width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .viewer-btn:active { background:rgba(255,255,255,0.2); }
        .viewer-btn svg { width:16px; height:16px; fill:currentColor; }
        
        #viewer-save { 
            border-radius:20px; width:auto; padding:0 16px; font-family:'Courier New',monospace; font-size:11px; font-weight:bold;
            display:flex; align-items:center; gap:6px; background:#ffaa00; color:#000; border:none;
        }
        #viewer-save:active { background:#e09600; }
        #viewer-save svg { width:14px; height:14px; }
        
        .viewer-counter { font-size:11px; color:#888; letter-spacing:1px; }
        .viewer-back { 
            position:absolute; top:calc(env(safe-area-inset-top, 0px) + 14px); left:14px; 
            background:rgba(0,0,0,0.5); border:1px solid #333; color:#fff; width:36px; height:36px; border-radius:50%; cursor:pointer; 
            display:flex; align-items:center; justify-content:center; z-index:10;
        }
        .viewer-back svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2.5; }
    </style>
</head>

function buildLUT(type) {
    const lut=new Uint8Array(256);
    for(let i=0;i<256;i++){
        const t=i/255; let v;
        if      (type==='flat')     v=t<0.5?2*t*t*0.4+t*0.6:(1-Math.pow(-2*t+2,2)/2)*0.4+t*0.6;
        else if (type==='soft_s')   v=t<0.5?2*t*t*0.6+t*0.4:(1-Math.pow(-2*t+2,2)/2)*0.6+t*0.4;
        else if (type==='punchy_s') v=t<0.5?2*t*t*0.75+t*0.25:(1-Math.pow(-2*t+2,2)/2)*0.75+t*0.25;
        else if (type==='bw_s')     v=t<0.5?2*t*t*0.80+t*0.20:(1-Math.pow(-2*t+2,2)/2)*0.80+t*0.20;
        else v=t;
        lut[i]=Math.min(255,Math.round(v*255));
    }
    return lut;
}
const LUTS={};['flat','soft_s','punchy_s','bw_s'].forEach(k=>LUTS[k]=buildLUT(k));

async function initCamera(facing) {
    if(activeStream) activeStream.getTracks().forEach(t=>t.stop());
    try {
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}},audio:false});
        activeStream=stream; video.srcObject=stream;
        zoomTrack=stream.getVideoTracks()[0];
        const caps=zoomTrack.getCapabilities?.()??{};
        if(caps.zoom){ zoomSlider.min=caps.zoom.min; zoomSlider.max=caps.zoom.max; zoomSlider.step=caps.zoom.step??0.1; zoomSlider.value=caps.zoom.min; currentZoom=caps.zoom.min; }
        else { zoomTrack=null; zoomSlider.min=1; zoomSlider.max=5; zoomSlider.step=0.1; zoomSlider.value=1; currentZoom=1; }
        updateZoomUI(currentZoom); statusEl.textContent='READY TO SHOOT';
    } catch {
        try { const s=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1920},height:{ideal:1080}},audio:false}); activeStream=s; video.srcObject=s; zoomTrack=null; statusEl.textContent='READY TO SHOOT'; }
        catch { statusEl.textContent='CAMERA ERROR'; alert('Vui lòng cấp quyền camera!'); }
    }
}

function updateZoomUI(z) {
    zoomLabel.textContent=z.toFixed(1)+'×';
    const min=parseFloat(zoomSlider.min),max=parseFloat(zoomSlider.max);
    zoomSlider.style.setProperty('--pct',((z-min)/(max-min)*100)+'%');
    zoomSlider.value=z;
}
async function setZoom(z) {
    const min=parseFloat(zoomSlider.min),max=parseFloat(zoomSlider.max);
    z=Math.max(min,Math.min(max,z)); currentZoom=z; updateZoomUI(z);
    if(zoomTrack){ try{await zoomTrack.applyConstraints({advanced:[{zoom:z}]});}catch{} }
    else{ video.style.transform=facingMode==='user'?`scaleX(-1) scale(${z})`:`scale(${z})`; }
}

    cx.fillStyle='rgba(255,220,160,0.6)';cx.beginPath();cx.ellipse(w*.55,h*.45,w*.18,h*.25,0,0,Math.PI*2);cx.fill();
}

// ── PROCESSING PIPELINE ──
function applyGrade(data,film){
    if(!film.grade) return;
    const{rMul,gMul,bMul,rLift,gLift,bLift}=film.grade;
    const cc=film.colorCast??null,ccR=cc?.r??0,ccG=cc?.g??0,ccB=cc?.b??0;
    for(let i=0;i<data.length;i+=4){
        data[i]  =Math.min(255,Math.max(0,data[i]  *rMul*.92+rLift+ccR));
        data[i+1]=Math.min(255,Math.max(0,data[i+1]*gMul*.92+gLift+ccG));
        data[i+2]=Math.min(255,Math.max(0,data[i+2]*bMul*.92+bLift+ccB));
    }
}
function applyBW(data){for(let i=0;i<data.length;i+=4){const l=data[i]*.299+data[i+1]*.587+data[i+2]*.114;data[i]=data[i+1]=data[i+2]=l;}}
function applyCurve(data,lut){for(let i=0;i<data.length;i+=4){data[i]=lut[data[i]];data[i+1]=lut[data[i+1]];data[i+2]=lut[data[i+2]];}}
function applyGrain(data,g){for(let i=0;i<data.length;i+=4){const n=(Math.random()-.5)*g;data[i]=Math.min(255,Math.max(0,data[i]+n));data[i+1]=Math.min(255,Math.max(0,data[i+1]+n));data[i+2]=Math.min(255,Math.max(0,data[i+2]+n));}}
function applyHalation(w,h,hal){
    if(!hal)return;
    const hx=ctx.createRadialGradient(w*.5,h*.2,0,w*.5,h*.2,w*.6);
    hx.addColorStop(0,`rgba(${hal.r},${hal.g},${hal.b},${hal.strength})`);
    hx.addColorStop(1,`rgba(${hal.r},${hal.g},${hal.b},0)`);
    ctx.globalCompositeOperation='screen';ctx.fillStyle=hx;ctx.fillRect(0,0,w,h);
    ctx.globalCompositeOperation='source-over';
}
function applyVignette(w,h,film){
    const vg=ctx.createRadialGradient(w/2,h/2,w*film.vignetteInner,w/2,h/2,w*film.vignetteOuter);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(0,0,0,${film.vignetteAlpha})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,w,h);
}
function applyPolaroidBorder(w,h){
    const t=Math.floor(w*.05),bot=Math.floor(w*.18);
    ctx.fillStyle='#f5f0e8';
    ctx.fillRect(0,0,w,t);ctx.fillRect(0,0,t,h);ctx.fillRect(w-t,0,t,h);ctx.fillRect(0,h-bot,w,bot);
}
function drawDateStamp(w,h,film){
    const now=new Date();
    const s=`'${String(now.getFullYear()).slice(-2)} ${String(now.getMonth()+1).padStart(2,'0')} ${String(now.getDate()).padStart(2,'0')}`;
    const fs=Math.floor(w*.042);
    ctx.font=`bold ${fs}px "Courier New",monospace`;
    ctx.fillStyle=film.stampColor;ctx.shadowColor=film.stampShadow;ctx.shadowBlur=fs*.3;
    const tw=ctx.measureText(s).width;
    ctx.fillText(s,w-tw-w*.04,film.border?h-w*.18-h*.02:h-h*.04);
    ctx.shadowBlur=0;
}

function captureFrame(film){
    return new Promise(resolve=>{
        canvas.width=video.videoWidth||1280;canvas.height=video.videoHeight||720;
        ctx.filter='none';
        if(facingMode==='user'){ctx.save();ctx.translate(canvas.width,0);ctx.scale(-1,1);ctx.drawImage(video,0,0,canvas.width,canvas.height);ctx.restore();}
        else ctx.drawImage(video,0,0,canvas.width,canvas.height);
        const id=ctx.getImageData(0,0,canvas.width,canvas.height),d=id.data;
        if(film.id==='ilford') applyBW(d); else applyGrade(d,film);
        if(LUTS[film.curve]) applyCurve(d,LUTS[film.curve]); 
        applyGrain(d,film.grain);
        ctx.putImageData(id,0,0);
        applyHalation(canvas.width,canvas.height,film.halation);
        applyVignette(canvas.width,canvas.height,film);
        if(film.border) applyPolaroidBorder(canvas.width,canvas.height);
        drawDateStamp(canvas.width,canvas.height,film);
        canvas.toBlob(blob=>resolve({blob,url:URL.createObjectURL(blob)}),'image/jpeg',.93);
    });
}

function triggerFlash(){
    flashOverlay.style.transition='opacity 0.04s ease-in';flashOverlay.style.opacity='.9';
    setTimeout(()=>{flashOverlay.style.transition='opacity 0.4s ease-out';flashOverlay.style.opacity='0';},70);
}

async function savePhoto(blob,filename){
    const file=new File([blob],filename,{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare?.({files:[file]})){
        try{await navigator.share({files:[file],title:'Retro Photo'});return;}catch(e){if(e.name==='AbortError')return;}
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function addToGallery(url,blob,filename,filmName){
    photoRoll.push({url,blob,filename,filmName});
    const n=photoRoll.length;
    galleryBadge.textContent=n;galleryBadge.style.display='flex';
    const th=document.createElement('div');th.className='gallery-thumb';th.dataset.idx=n-1;
    const img=document.createElement('img');img.src=url;img.loading='lazy';
    const il=document.createElement('span');il.className='thumb-idx';il.textContent=n;
    th.appendChild(img);th.appendChild(il);
    th.addEventListener('click',()=>openViewer(parseInt(th.dataset.idx)));
    galleryGrid.insertBefore(th,galleryGrid.firstChild);
    galleryCount.textContent=n+' SHOTS';
}

function openViewer(idx){viewerIdx=idx;renderViewer();galleryOverlay.classList.remove('open');photoViewer.classList.add('open');}

function runTimer(s){
    return new Promise(resolve=>{
        timerOverlay.classList.add('show');timerNumber.textContent=s;
        let c=s;
        const iv=setInterval(()=>{c--;if(c<=0){clearInterval(iv);timerOverlay.classList.remove('show');resolve();}else timerNumber.textContent=c;},1000);
    });
}

// ── MAIN SHUTTER TRIGGER EVENT ──
captureBtn.addEventListener('click',async function(){
    if(isReviewing){
        preview.style.display='none';isReviewing=false;
        statusEl.textContent='READY TO SHOOT';
        const freshDot = document.getElementById('shutter-dot');
        if(freshDot) freshDot.style.background = (shootMode && shootMode.startsWith('timer')) ? 'radial-gradient(circle at 38% 35%,#44aaff,#0066cc)' : 'radial-gradient(circle at 38% 35%,#ff6655,#cc1100)';
        return;
    }
    if(isShooting)return;
    isShooting=true;captureBtn.disabled=true;
    const film=currentFilm;

    if(shootMode==='timer3'||shootMode==='timer10'){
        const secs=shootMode==='timer3'?3:10;
        statusEl.textContent=`TIMER ${secs}s...`;
        await runTimer(secs);triggerFlash();statusEl.textContent='DEVELOPING...';
        const{blob,url}=await captureFrame(film);const filename=`${film.short}_${Date.now()}.jpg`;
        preview.src=url;preview.style.display='block';isReviewing=true;
        photoCount++;counterEl.textContent=String(photoCount).padStart(2,'0');
        addToGallery(url,blob,filename,film.name);
        statusEl.textContent='✓ SAVED';captureBtn.textContent='';
        captureBtn.innerHTML='<div class="shutter-dot" id="shutter-dot" style="background:radial-gradient(circle at 38% 35%,#44aaff,#0066cc)"></div>';
        captureBtn.disabled=false;isShooting=false;
        await savePhoto(blob,filename);return;
    }

    statusEl.textContent='DEVELOPING...';triggerFlash();
    await new Promise(r=>setTimeout(r,60));
    const{blob,url}=await captureFrame(film);const filename=`${film.short}_${Date.now()}.jpg`;
    preview.src=url;preview.style.display='block';isReviewing=true;
    photoCount++;counterEl.textContent=String(photoCount).padStart(2,'0');
    addToGallery(url,blob,filename,film.name);
    statusEl.textContent='✓ TAP TO CONTINUE';
    captureBtn.disabled=false;isShooting=false;
    await savePhoto(blob,filename);
});

window.addEventListener('beforeunload',()=>{if(activeStream)activeStream.getTracks().forEach(t=>t.stop());});
window.addEventListener('load',()=>initCamera(facingMode));
</script>
</body>
</html>
