<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Retro Camera Premium Studio</title>
    <style>
        /* ── CSS RESET & HYBRID WEBVIEW OPTIMIZATIONS ── */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-user-select: none; 
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }
        
        body {
            background: #0d0d0d; 
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            overflow: hidden;
            padding-top: env(safe-area-inset-top, 0px);
            padding-bottom: env(safe-area-inset-bottom, 0px);
            padding-left: env(safe-area-inset-left, 0px);
            padding-right: env(safe-area-inset-right, 0px);
        }

        .camera-body {
            background: linear-gradient(160deg, #242424, #161616);
            border: 2px solid #2e2e2e; 
            border-radius: 20px;
            padding: 12px 12px 10px;
            box-shadow: inset 0 0 14px #000, 0 16px 40px rgba(0,0,0,0.9);
            width: 100%; 
            max-width: 420px; 
            height: 97vh;
            display: flex; 
            flex-direction: column; 
            gap: 7px;
        }

        /* ── Top bar ── */
        .top-bar { display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
        .top-left-group { display: flex; align-items: center; gap: 10px; }
        .led-display {
            background:#000; color:#ff3333; font-size:12px;
            padding:4px 9px; border-radius:4px; font-weight:bold;
            border:1px solid #1e1e1e; box-shadow:inset 0 0 5px #ff000055; letter-spacing:1px;
        }
        .btn-info {
            background: none; border: none; color: #888; font-size: 18px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            padding: 2px; transition: color 0.1s;
        }
        .btn-info:active { color: #fff; }
        .film-name { font-size:10px; color:#ffaa00; letter-spacing:1.5px; text-transform:uppercase; max-width:160px; text-align:right; line-height:1.3; font-weight: bold;}

        /* ── Mode bar ── */
        .mode-bar { display:flex; gap:5px; justify-content:center; flex-shrink:0; overflow-x: auto; scrollbar-width: none;}
        .mode-bar::-webkit-scrollbar { display: none; }
        .mode-btn {
            font-size:10px; padding:5px 11px; border-radius:20px; cursor:pointer;
            border:1.5px solid #333; background:#161616; color:#666;
            letter-spacing:0.5px; transition:all 0.15s; display:flex; align-items:center; gap:4px;
            min-height: 36px; flex-shrink: 0;
        }
        .mode-btn.active { border-color:#ffaa00; color:#ffaa00; background:#1e1800; }
        .mode-btn svg { width:12px; height:12px; display: block; }

        /* ── Viewfinder ── */
        .viewfinder {
            flex:1; border:2px solid #111; background:#0a0a0a;
            position:relative; overflow:hidden; border-radius:8px; min-height:0;
            touch-action:none;
        }
        #webcam { width:100%; height:100%; object-fit:cover; display:block; }
        #webcam.mirrored { transform:scaleX(-1); }
        #preview { display:none; position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2; }
        #flash-overlay { position:absolute; inset:0; background:white; opacity:0; z-index:10; pointer-events:none; }

        /* Corner brackets */
        .viewfinder::before,.viewfinder::after,.vf-br::before,.vf-br::after {
            content:''; position:absolute; width:18px; height:18px;
            border-color:rgba(255,255,255,0.3); border-style:solid; z-index:5;
        }
        .viewfinder::before { top:8px; left:8px; border-width:2px 0 0 2px; }
        .viewfinder::after  { top:8px; right:8px; border-width:2px 2px 0 0; }
        .vf-br::before { bottom:8px; left:8px; border-width:0 0 2px 2px; }
        .vf-br::after  { bottom:8px; right:8px; border-width:0 2px 2px 0; }

        /* Grid overlay */
        #grid-overlay { position:absolute; inset:0; z-index:4; pointer-events:none; display:none; }
        #grid-overlay.show { display:block; }
        .gl { position:absolute; background:rgba(255,255,255,0.2); }
        .gl.h { left:0; right:0; height:1px; }
        .gl.v { top:0; bottom:0; width:1px; }

        /* Timer overlay */
        #timer-overlay {
            position:absolute; inset:0; z-index:20; display:none;
            align-items:center; justify-content:center; background:rgba(0,0,0,0.4);
        }
        #timer-overlay.show { display:flex; }
        #timer-number {
            font-size:96px; font-weight:bold; color:#fff;
            text-shadow:0 0 30px rgba(255,170,0,0.9);
            animation:pulse 1s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

        /* ── Zoom bar ── */
        .zoom-bar { flex-shrink:0; display:flex; align-items:center; gap:8px; padding:0 2px; }
        .zoom-label { font-size:10px; color:#666; width:34px; text-align:right; letter-spacing:1px; }
        #zoom-slider {
            flex:1; -webkit-appearance:none; appearance:none; height:3px; border-radius:2px;
            background:linear-gradient(to right, #ffaa00 var(--pct,0%), #333 var(--pct,0%));
            outline:none;
        }
        #zoom-slider::-webkit-slider-thumb {
            -webkit-appearance:none; width:16px; height:16px;
            border-radius:50%; background:#ffaa00; border:2px solid #fff; cursor:pointer;
        }
        .zoom-btn {
            background:#1e1e1e; border:1.5px solid #333; color:#888;
            width:28px; height:28px; border-radius:50%;
            cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .zoom-btn:active { background:#2a2a2a; color:#fff; }
        .zoom-btn svg { width:12px; height:12px; fill:currentColor; }

        /* ── Filter strip ── */
        .filter-strip {
            flex-shrink:0; display:flex; gap:6px;
            overflow-x:auto; padding:2px 0 4px; scrollbar-width:none;
            min-height: 64px;
        }
        .filter-strip::-webkit-scrollbar { display:none; }
        .filter-btn {
            flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:4px;
            cursor:pointer; padding:4px 5px; border-radius:8px;
            border:1.5px solid transparent; background:#1a1a1a; min-width:54px;
            transition:border-color 0.15s;
        }
        .filter-btn.active { border-color:#ffaa00; background:#1e1800; }
        .filter-thumb { width:40px; height:40px; border-radius:5px; overflow:hidden; background:#222; position:relative; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
        .filter-label { font-size:8px; color:#666; text-align:center; font-weight:bold; }
        .filter-btn.active .filter-label { color:#ffaa00; }

        /* ── Bottom bar ── */
        .bottom-bar {
            flex-shrink:0; display:flex; align-items:center;
            justify-content:space-between; padding:0 4px; gap:4px;
        }

        .btn-flip, .btn-import, .btn-gallery {
            width:44px; height:44px; border-radius:50%;
            background:#1e1e1e; border:1.5px solid #333;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; transition:background 0.1s; position:relative;
        }
        .btn-flip:active, .btn-import:active, .btn-gallery:active { background:#2a2a2a; border-color:#555; }
        .btn-flip svg, .btn-import svg, .btn-gallery svg { width:20px; height:20px; }

        /* Shutter button */
        .shutter-btn {
            width:66px; height:68px; border-radius:50%; cursor:pointer;
            background:radial-gradient(circle at 38% 35%, #f0f0f0, #c0c0c0);
            border:3px solid #888;
            box-shadow:0 0 0 4px #2a2a2a, 0 5px 0 #555, 0 8px 15px rgba(0,0,0,0.6);
            transition:all 0.1s;
            display:flex; align-items:center; justify-content:center;
        }
        .shutter-btn:active {
            box-shadow:0 0 0 4px #2a2a2a, 0 1px 0 #555, 0 3px 6px rgba(0,0,0,0.6);
            transform:translateY(4px);
        }
        .shutter-btn:disabled { opacity:0.4; transform:none; }
        .shutter-dot {
            width:16px; height:16px; border-radius:50%;
            background:radial-gradient(circle at 38% 35%, #ff6655, #cc1100);
            box-shadow:0 0 6px rgba(200,0,0,0.5);
            transition: all 0.2s;
        }
        /* Style chấm đỏ nhấp nháy khi quay video */
        .shutter-btn.recording .shutter-dot {
            border-radius: 2px;
            transform: scale(0.9);
            animation: pulseRecord 1s infinite alternate;
        }
        @keyframes pulseRecord { from { opacity: 1; } to { opacity: 0.3; } }

        .gallery-badge {
            position:absolute; top:-4px; right:-4px;
            background:#ff3333; color:#fff; font-size:9px; font-weight:bold;
            width:17px; height:17px; border-radius:50%;
            display:none; align-items:center; justify-content:center;
        }

        #status {
            font-size:10px; color:#555; text-align:center;
            flex-shrink:0; letter-spacing:1px; min-height:14px; margin-bottom: 2px;
        }

        /* ══ PREMIUM OVERLAYS ══ */
        #gallery-overlay { display:none; position:fixed; inset:0; background:#000; z-index:100; flex-direction:column; }
        #gallery-overlay.open { display:flex; }
        .gallery-header { 
            display:flex; align-items:center; justify-content:space-between; padding:14px 16px 10px; border-bottom:1px solid #1e1e1e;
            padding-top: calc(env(safe-area-inset-top, 0px) + 14px);
        }
        .gallery-title { font-size:13px; color:#ffaa00; letter-spacing:2px; font-weight:bold; }
        .gallery-close { background:#1e1e1e; border:1px solid #333; color:#fff; width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .gallery-close svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2.5; }
        
        .gallery-grid { flex:1; overflow-y:auto; padding:8px; display:grid; grid-template-columns:repeat(3,1fr); gap:3px; }
        .gallery-thumb { aspect-ratio:1; overflow:hidden; cursor:pointer; border-radius:3px; position:relative; background:#111; }
        .gallery-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
        .gallery-thumb .thumb-idx { position:absolute; bottom:3px; right:4px; font-size:8px; color:rgba(255,255,255,0.5); }

        /* ══ PHOTO VIEWER ══ */
        #photo-viewer { display:none; position:fixed; inset:0; background:#000; z-index:200; flex-direction:column; align-items:center; justify-content:center; }
        #photo-viewer.open { display:flex; }
        #viewer-img { max-width:100%; max-height:calc(100vh - 80px); object-fit:contain; border-radius:4px; }
        .viewer-bar { 
            position:absolute; bottom:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between; 
            padding:12px 16px calc(env(safe-area-inset-bottom, 0px) + 12px); 
            background:linear-gradient(transparent,rgba(0,0,0,0.8)); 
        }
        .viewer-btn { 
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; 
            width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;
        }
        .viewer-btn:active { background:rgba(255,255,255,0.2); }
        .viewer-btn svg { width:16px; height:16px; fill:currentColor; }
        
        #viewer-save { 
            border-radius:20px; width:auto; padding:0 16px; font-family:'Courier New',monospace; font-size:11px; font-weight:bold;
            display:flex; align-items:center; gap:6px; background:#ffaa00; color:#000; border:none;
        }
        #viewer-save:active { background:#e09600; }
        #viewer-save svg { width:14px; height:14px; }
        
        .viewer-counter { font-size:11px; color:#888; letter-spacing:1px; }
        .viewer-back { 
            position:absolute; top:calc(env(safe-area-inset-top, 0px) + 14px); left:14px; 
            background:rgba(0,0,0,0.5); border:1px solid #333; color:#fff; width:36px; height:36px; border-radius:50%; cursor:pointer; 
            display:flex; align-items:center; justify-content:center; z-index:10;
        }
        .viewer-back svg { width:16px; height:16px; fill:none; stroke:currentColor; stroke-width:2.5; }

        /* ══ INFO / ABOUT MODAL BẢN QUYỀN ══ */
        #info-overlay { 
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:300; 
            align-items:center; justify-content:center; backdrop-filter: blur(4px);
        }
        #info-overlay.open { display:flex; }
        .info-box { 
            background:#161616; border:1px solid #333; padding:24px; 
            border-radius:12px; text-align:center; max-width:80%; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .info-box h3 { color:#ffaa00; margin-bottom:5px; letter-spacing:1px; font-size: 16px; }
        .info-box p.version { color:#aaa; font-size:11px; margin-bottom:15px; }
        .info-box hr { border:none; border-top:1px dashed #444; margin:15px 0; }
        .info-box .copyright { color:#666; font-size:9px; font-weight:bold; letter-spacing: 0.5px; line-height: 1.5; }
        #info-close { 
            background:#333; color:#fff; border:none; padding:8px 24px; 
            border-radius:20px; cursor:pointer; font-weight:bold; font-size:10px; margin-top: 15px; transition: 0.2s;
        }
        #info-close:active { background: #ffaa00; color: #000; }
    </style>
</head>
<body>

        <div class="top-left-group">
            <div class="led-display">FILM: <span id="counter">00</span></div>

                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>

<div id="gallery-overlay">

function buildLUT(type) {
    const lut=new Uint8Array(256);
    for(let i=0;i<256;i++){
        const t=i/255; let v;
        if      (type==='flat')     v=t<0.5?2*t*t*0.4+t*0.6:(1-Math.pow(-2*t+2,2)/2)*0.4+t*0.6;
        else if (type==='soft_s')   v=t<0.5?2*t*t*0.6+t*0.4:(1-Math.pow(-2*t+2,2)/2)*0.6+t*0.4;
        else if (type==='punchy_s') v=t<0.5?2*t*t*0.75+t*0.25:(1-Math.pow(-2*t+2,2)/2)*0.75+t*0.25;
        else if (type==='bw_s')     v=t<0.5?2*t*t*0.80+t*0.20:(1-Math.pow(-2*t+2,2)/2)*0.80+t*0.20;
        else v=t;
        lut[i]=Math.min(255,Math.round(v*255));
    }
    return lut;
}
const LUTS={};['flat','soft_s','punchy_s','bw_s'].forEach(k=>LUTS[k]=buildLUT(k));

let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playShutterSound() {
    try {
        initAudio();
        const bufferSize = audioCtx.sampleRate * 0.08;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
        const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'highpass'; filter.frequency.value = 1200;
        const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.07);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
    } catch(e){}
}
function playWindingSound() {
    try {
        initAudio();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.setValueAtTime(90, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        for(let i=0; i<5; i++) {
            let t = audioCtx.currentTime + i * 0.07;
            gain.gain.setValueAtTime(0.12, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
        }
        osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.35);
    } catch(e){}
}

async function initCamera(facing) {
    if(activeStream) activeStream.getTracks().forEach(t=>t.stop());
    try {
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}},audio:false});
        activeStream=stream; video.srcObject=stream; zoomTrack=stream.getVideoTracks()[0];
        const caps=zoomTrack.getCapabilities?.()??{};
        if(caps.zoom){ zoomSlider.min=caps.zoom.min; zoomSlider.max=caps.zoom.max; zoomSlider.step=caps.zoom.step??0.1; zoomSlider.value=caps.zoom.min; currentZoom=caps.zoom.min; }
        else { zoomTrack=null; zoomSlider.min=1; zoomSlider.max=5; zoomSlider.step=0.1; zoomSlider.value=1; currentZoom=1; }
        updateZoomUI(currentZoom); statusEl.textContent='READY TO SHOOT';
        if(flashOn) applyHardwareFlash(true);
    } catch {
        try { const s=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1920},height:{ideal:1080}},audio:false}); activeStream=s; video.srcObject=s; zoomTrack=null; statusEl.textContent='READY TO SHOOT'; }
        catch { statusEl.textContent='CAMERA ERROR'; alert('Vui lòng cấp quyền camera!'); }
    }
}

function applyGrade(data,film){
    if(!film.grade) return;
    const{rMul,gMul,bMul,rLift,gLift,bLift}=film.grade;
    const cc=film.colorCast??null,ccR=cc?.r??0,ccG=cc?.g??0,ccB=cc?.b??0;
    for(let i=0;i<data.length;i+=4){
        data[i]  =Math.min(255,Math.max(0,data[i]  *rMul*.92+rLift+ccR));
        data[i+1]=Math.min(255,Math.max(0,data[i+1]*gMul*.92+gLift+ccG));
        data[i+2]=Math.min(255,Math.max(0,data[i+2]*bMul*.92+bLift+ccB));
    }
}
function applyBW(data){for(let i=0;i<data.length;i+=4){const l=data[i]*.299+data[i+1]*.587+data[i+2]*.114;data[i]=data[i+1]=data[i+2]=l;}}
function applyCurve(data,lut){for(let i=0;i<data.length;i+=4){data[i]=lut[data[i]];data[i+1]=lut[data[i+1]];data[i+2]=lut[data[i+2]];}}
function applyGrain(data,g){for(let i=0;i<data.length;i+=4){const n=(Math.random()-.5)*g;data[i]=Math.min(255,Math.max(0,data[i]+n));data[i+1]=Math.min(255,Math.max(0,data[i+1]+n));data[i+2]=Math.min(255,Math.max(0,data[i+2]+n));}}
function applyHalation(w,h,hal){
    if(!hal)return;
    const hx=ctx.createRadialGradient(w*.5,h*.2,0,w*.5,h*.2,w*.6);
    hx.addColorStop(0,`rgba(${hal.r},${hal.g},${hal.b},${hal.strength})`);   hx.addColorStop(1,`rgba(${hal.r},${hal.g},${hal.b},0)`);
    ctx.globalCompositeOperation='screen';ctx.fillStyle=hx;ctx.fillRect(0,0,w,h);ctx.globalCompositeOperation='source-over';
}
function applyVignette(w,h,film){
    const vg=ctx.createRadialGradient(w/2,h/2,w*film.vignetteInner,w/2,h/2,w*film.vignetteOuter);
    vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(0,0,0,${film.vignetteAlpha})`);
    ctx.fillStyle=vg;ctx.fillRect(0,0,w,h);
}
function applyPolaroidBorder(w,h){
    const t=Math.floor(w*.05),bot=Math.floor(w*.18);
    ctx.fillStyle='#f5f0e8'; ctx.fillRect(0,0,w,t);ctx.fillRect(0,0,t,h);ctx.fillRect(w-t,0,t,h);ctx.fillRect(0,h-bot,w,bot);
}
function drawDateStamp(w,h,film){
    const now=new Date();
    const s=`'${String(now.getFullYear()).slice(-2)} ${String(now.getMonth()+1).padStart(2,'0')} ${String(now.getDate()).padStart(2,'0')}`;
    const fs=Math.floor(w*.042); ctx.font=`bold ${fs}px "Courier New",monospace`;
    ctx.fillStyle=film.stampColor;ctx.shadowColor=film.stampShadow;ctx.shadowBlur=fs*.3;
    const tw=ctx.measureText(s).width; ctx.fillText(s,w-tw-w*.04,film.border?h-w*.18-h*.02:h-h*.04); ctx.shadowBlur=0;
}
function drawWatermark(w,h) {
    const txt = "SHOT ON RETRO CAM"; const fs = Math.floor(w * 0.022);
    ctx.font = `bold ${fs}px "Courier New",monospace`; ctx.fillStyle = "rgba(255, 255, 255, 0.45)";
    ctx.fillText(txt, w * 0.04, film.border ? h - w * 0.18 - h * 0.02 : h - h * 0.04);
}

// ── ENGINE XỬ LÝ ẢNH CORE ──
function captureFrame(film, sourceImg = null){
    return new Promise(resolve=>{
        if (sourceImg) {
            canvas.width = sourceImg.naturalWidth || 1280; canvas.height = sourceImg.naturalHeight || 720;
            ctx.filter = 'none'; ctx.drawImage(sourceImg, 0, 0, canvas.width, canvas.height);
        } else {
            canvas.width=video.videoWidth||1280;canvas.height=video.videoHeight||720; ctx.filter='none';
            if(facingMode==='user'){ctx.save();ctx.translate(canvas.width,0);ctx.scale(-1,1);ctx.drawImage(video,0,0,canvas.width,canvas.height);ctx.restore();}
            else ctx.drawImage(video,0,0,canvas.width,canvas.height);
        }
        const id=ctx.getImageData(0,0,canvas.width,canvas.height),d=id.data;
        if(film.id==='ilford') applyBW(d); else applyGrade(d,film);
        if(LUTS[film.curve]) applyCurve(d,LUTS[film.curve]); applyGrain(d,film.grain); ctx.putImageData(id,0,0);
        applyHalation(canvas.width,canvas.height,film.halation); applyVignette(canvas.width,canvas.height,film);
        if(film.border) applyPolaroidBorder(canvas.width,canvas.height);
        drawDateStamp(canvas.width,canvas.height,film); drawWatermark(canvas.width,canvas.height);
        canvas.toBlob(blob=>resolve({blob,url:URL.createObjectURL(blob)}),'image/jpeg',.93);
    });
}

function triggerFlash(){
    flashOverlay.style.transition='opacity 0.04s ease-in';flashOverlay.style.opacity='.9';
    setTimeout(()=>{flashOverlay.style.transition='opacity 0.4s ease-out';flashOverlay.style.opacity='0';},70);
}

async function savePhoto(blob,filename){
    const file=new File([blob],filename,{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare?.({files:[file]})){
        try{await navigator.share({files:[file],title:'Retro Photo'});return;}catch(e){if(e.name==='AbortError')return;}
    }
    const url=URL.createObjectURL(blob); const a=document.createElement('a');a.href=url;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),1000);
}

// HÀM HIỂN THỊ ẢNH IMPORT LIVE PREVIEW KHI ĐỔI FILTER
async function renderImportedLivePreview() {
    if(!currentImportedImageSource) return;
    statusEl.textContent = 'RENDERING FILTER...';
    const {url} = await captureFrame(currentFilm, currentImportedImageSource);
    preview.src = url;
    preview.style.display = 'block';
    statusEl.textContent = 'CHOOSE FILTER OR TAP SHUTTER TO BAKE';
}

// ── LOGIC IMPORT FILE THƯ VIỆN CHUẨN UX ──
importBtn.addEventListener('click', () => {
    if(isShooting || isRecordingVideo) return;
    importInput.click();
});
importInput.addEventListener('change', (e) => {
    const file = e.target.files[0]; if(!file) return;
    statusEl.textContent = 'LOADING IMAGE...';
    
    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = () => {
        currentImportedImageSource = img;
        isReviewing = true;
        // Đổi màu nút Shutter sang chế độ in ảnh để sếp nhận biết
        shutterDot.style.background = 'radial-gradient(circle at 38% 35%, #ffcc44, #ff8800)';
        renderImportedLivePreview();
    };
});

// ── TÍNH NĂNG QUAY VIDEO RETRO MODE LUỒNG CAO CẤP ──
function runVideoRenderLoop() {
    if(!isRecordingVideo) return;
    canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
    
    // Áp bộ lọc màu Live của phim thẳng vào Canvas cơ học phần cứng
    ctx.filter = currentFilm.liveFilter;
    if(facingMode === 'user') {
        ctx.save(); ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height); ctx.restore();
    } else {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    }
    ctx.filter = 'none';
    
    // Đóng dấu ngày tháng chạy thời gian thực trên Video
    const now = new Date();
    const s = `'${String(now.getFullYear()).slice(-2)} ${String(now.getMonth()+1).padStart(2,'0')} ${String(now.getDate()).padStart(2,'0')}`;
    ctx.font = `bold ${Math.floor(canvas.width * 0.042)}px "Courier New",monospace`;
    ctx.fillStyle = currentFilm.stampColor;
    ctx.fillText(s, canvas.width - ctx.measureText(s).width - (canvas.width*0.04), canvas.height - (canvas.height*0.04));
    
    videoRenderLoopId = requestAnimationFrame(runVideoRenderLoop);
}

async function startVideoRecording() {
    try {
        isShooting = true; isRecordingVideo = true;
        captureBtn.classList.add('recording');
        statusEl.textContent = '• RECORDING RETRO VIDEO...';
        playShutterSound();
        
        canvas.width = video.videoWidth || 640; canvas.height = video.videoHeight || 480;
        runVideoRenderLoop();
        
        const stream = canvas.captureStream(25); // Ghi luồng ở tần số 25fps cổ điển
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
        mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const filename = `VIDEO_${currentFilm.short}_${Date.now()}.webm`;
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a'); a.href = url; a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            
            statusEl.textContent = '✓ VIDEO SAVED TO FILES';
            playWindingSound();
            isShooting = false; isRecordingVideo = false;
            captureBtn.classList.remove('recording');
        };
        mediaRecorder.start();
    } catch(err) {
        isShooting = false; isRecordingVideo = false;
        captureBtn.classList.remove('recording');
        statusEl.textContent = 'RECORDING ERROR';
    }
}
function stopVideoRecording() {
    if(mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        cancelAnimationFrame(videoRenderLoopId);
    }
}

// ── ĐIỀU HƯỚNG SỰ KIỆN NÚT CỬA TRẬP (SHUTTER ROUTER BUTTON) ──
captureBtn.addEventListener('click', async function(){
    // TRƯỜNG HỢP 1: Sếp đang xem ảnh Import và muốn BAKE (Nướng ảnh) & LƯU FILE
    if(isReviewing && currentImportedImageSource) {
        isShooting = true; captureBtn.disabled = true;
        statusEl.textContent = 'BAKING FILM EMULSION...';
        triggerFlash(); playShutterSound();
        
        try {
            const film = currentFilm;
            const {blob, url} = await captureFrame(film, currentImportedImageSource);
            const filename = `RETRO_LAB_${film.short}_${Date.now()}.jpg`;
            
            addToGallery(url, blob, filename, film.name);
            await savePhoto(blob, filename);
            
            // XÁC NHẬN LƯU THÀNH CÔNG RÕ RÀNG VÀ CHUYỂN NGAY VỀ CAMERA
            playWindingSound();
            statusEl.textContent = '✓ PHOTO SAVED TO GALLERY';
            
            // Giải phóng trạng thái review, ẩn lớp ảnh đè
            currentImportedImageSource = null;
            preview.style.display = 'none';
            isReviewing = false;
            importInput.value = '';
            shutterDot.style.background = 'radial-gradient(circle at 38% 35%,#ff6655,#cc1100)';
        } catch (err) {
            statusEl.textContent = 'SAVE FAILED';
        } finally {
            captureBtn.disabled = false; isShooting = false;
        }
        return;
    }

    // TRƯỜNG HỢP 2: Đang ở chế độ xem ảnh chụp thường (Review Mode thường)
    if(isReviewing) {
        preview.style.display='none'; isReviewing=false;
        statusEl.textContent='READY TO SHOOT';
        shutterDot.style.background = (shootMode === 'video') ? 'radial-gradient(circle at 38% 35%,#ff4444,#aa0000)' : (shootMode.startsWith('timer')) ? 'radial-gradient(circle at 38% 35%,#44aaff,#0066cc)' : 'radial-gradient(circle at 38% 35%,#ff6655,#cc1100)';
        return;
    }

    if(isShooting && !isRecordingVideo) return;

    // TRƯỜNG HỢP 3: ĐANG Ở CHẾ ĐỘ QUAY VIDEO
    if(shootMode === 'video') {
        if(!isRecordingVideo) {
            await startVideoRecording();
        } else {
            stopVideoRecording();
        }
        return;
    }

    // TRƯỜNG HỢP 4: CHỤP ẢNH LIVE CAMERA THƯỜNG (CÓ TIMER HOẶC SINGLE)
    isShooting=true; captureBtn.disabled=true;
    const film=currentFilm;

    try {
        if(shootMode==='timer3'||shootMode==='timer10'){
            const secs = shootMode==='timer3'?3:10; statusEl.textContent=`TIMER ${secs}s...`;
            await runTimer(secs); triggerFlash(); playShutterSound(); statusEl.textContent = 'PROCESSING...';
            
            const{blob,url}=await captureFrame(film); const filename=`${film.short}_${Date.now()}.jpg`;
            preview.src=url; preview.style.display='block'; isReviewing=true;
            photoCount++; counterEl.textContent=String(photoCount).padStart(2,'0');
            addToGallery(url,blob,filename,film.name); playWindingSound();
            statusEl.textContent='✓ SAVED TO GALLERIES';
            await savePhoto(blob,filename);
        } else {
            triggerFlash(); playShutterSound(); statusEl.textContent='PROCESSING...';
            await new Promise(r=>setTimeout(r, 60));
            const{blob,url}=await captureFrame(film); const filename=`${film.short}_${Date.now()}.jpg`;
            
            preview.src=url; preview.style.display='block'; isReviewing=true;
            photoCount++; counterEl.textContent=String(photoCount).padStart(2,'0');
            addToGallery(url,blob,filename,film.name); playWindingSound();
            statusEl.textContent='✓ PHOTO SAVED';
            await savePhoto(blob,filename);
        }
    } catch (err) {
        statusEl.textContent = 'CAMERA ERROR';
    } finally {
        captureBtn.disabled=false; isShooting=false;
    }
});

function addToGallery(url,blob,filename,filmName){
    photoRoll.push({url,blob,filename,filmName}); const n=photoRoll.length;
    galleryBadge.textContent=n; galleryBadge.style.display='flex';
    const th=document.createElement('div');th.className='gallery-thumb';th.dataset.idx=n-1;
    const img=document.createElement('img');img.src=url;img.loading='lazy';
    const il=document.createElement('span');il.className='thumb-idx';il.textContent=n;
    th.appendChild(img);th.appendChild(il); th.addEventListener('click',()=>openViewer(parseInt(th.dataset.idx)));
    galleryGrid.insertBefore(th,galleryGrid.firstChild); galleryCount.textContent=n+' SHOTS';
}
galleryBtn.addEventListener('click',()=>{if(photoRoll.length===0){statusEl.textContent='NO PHOTOS YET';return;}galleryOverlay.classList.add('open');});
galleryClose.addEventListener('click',()=>galleryOverlay.classList.remove('open'));

function openViewer(idx){viewerIdx=idx;renderViewer();galleryOverlay.classList.remove('open');photoViewer.classList.add('open');}
function renderViewer(){
    const p=photoRoll[viewerIdx]; viewerImg.src=p.url; viewerCounter.textContent=`${viewerIdx+1} / ${photoRoll.length}  [${p.filmName}]`;
    viewerPrev.style.opacity=viewerIdx>0?'1':'.3'; viewerNext.style.opacity=viewerIdx<photoRoll.length-1?'1':'.3';
}
viewerBack.addEventListener('click',()=>{photoViewer.classList.remove('open');galleryOverlay.classList.add('open');});
viewerPrev.addEventListener('click',()=>{if(viewerIdx>0){viewerIdx--;renderViewer();}});
viewerNext.addEventListener('click',()=>{if(viewerIdx<photoRoll.length-1){viewerIdx++;renderViewer();}});
viewerSave.addEventListener('click',()=>{const p=photoRoll[viewerIdx];savePhoto(p.blob,p.filename);});

let sx=0; viewerImg.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
viewerImg.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50){if(dx<0&&viewerIdx<photoRoll.length-1){viewerIdx++;renderViewer();}if(dx>0&&viewerIdx>0){viewerIdx--;renderViewer();}}});

window.addEventListener('beforeunload',()=>{if(activeStream)activeStream.getTracks().forEach(t=>t.stop());});
window.addEventListener('load',()=>initCamera(facingMode));
</script>
