<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Camera</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #111; color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        .camera-body {
            background: linear-gradient(160deg, #2a2a2a, #1a1a1a);
            border: 3px solid #3a3a3a; border-radius: 18px;
            padding: 12px 12px 10px;
            box-shadow: inset 0 0 12px #000, 0 12px 30px rgba(0,0,0,0.8);
            width: 100%; max-width: 420px; height: 97vh;
            display: flex; flex-direction: column; gap: 8px;
        }
        .top-bar {
            display: flex; justify-content: space-between;
            align-items: center; flex-shrink: 0;
        }
        .led-display {
            background: #000; color: #ff3333; font-size: 13px;
            padding: 4px 8px; border-radius: 3px; font-weight: bold;
            border: 1px solid #2a2a2a; box-shadow: inset 0 0 4px #ff000066;
            letter-spacing: 1px;
        }
        .film-name { font-size: 11px; color: #ffaa00; letter-spacing: 2px; text-transform: uppercase; }

        /* ── Viewfinder ── */
        .viewfinder {
            flex: 1; border: 2px solid #000; background: #111;
            position: relative; overflow: hidden; border-radius: 6px; min-height: 0;
            touch-action: none; /* cho pinch zoom */
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; display: block; }
        #webcam.mirrored { transform: scaleX(-1); }
        #preview {
            display: none; position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover; z-index: 2;
        }
        #flash-overlay {
            position: absolute; inset: 0; background: white;
            opacity: 0; z-index: 10; pointer-events: none;
        }
        .viewfinder::before, .viewfinder::after,
        .vf-br::before, .vf-br::after {
            content: ''; position: absolute;
            width: 16px; height: 16px;
            border-color: rgba(255,255,255,0.35); border-style: solid; z-index: 5;
        }
        .viewfinder::before { top:6px; left:6px; border-width: 2px 0 0 2px; }
        .viewfinder::after  { top:6px; right:6px; border-width: 2px 2px 0 0; }
        .vf-br::before { bottom:6px; left:6px; border-width: 0 0 2px 2px; }
        .vf-br::after  { bottom:6px; right:6px; border-width: 0 2px 2px 0; }

        /* ── Zoom bar ── */
        .zoom-bar {
            flex-shrink: 0;
            display: flex; align-items: center; gap: 8px;
            padding: 0 4px;
        }
        .zoom-label { font-size: 10px; color: #888; width: 36px; text-align: right; letter-spacing: 1px; }
        #zoom-slider {
            flex: 1; -webkit-appearance: none; appearance: none;
            height: 3px; border-radius: 2px;
            background: linear-gradient(to right, #ffaa00 var(--pct,0%), #444 var(--pct,0%));
            outline: none; cursor: pointer;
        }
        #zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            border-radius: 50%; background: #ffaa00;
            border: 2px solid #fff; cursor: pointer;
        }
        .zoom-btn {
            background: #222; border: 1.5px solid #444; color: #aaa;
            width: 28px; height: 28px; border-radius: 50%; font-size: 14px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .zoom-btn:active { background: #333; }

        /* ── Filter strip ── */
        .filter-strip {
            flex-shrink: 0; display: flex; gap: 6px;
            overflow-x: auto; padding: 2px 0 4px; scrollbar-width: none;
        }
        .filter-strip::-webkit-scrollbar { display: none; }
        .filter-btn {
            flex-shrink: 0; display: flex; flex-direction: column;
            align-items: center; gap: 3px; cursor: pointer;
            padding: 4px 6px; border-radius: 8px;
            border: 1.5px solid transparent; background: #222;
            transition: border-color 0.15s, background 0.15s; min-width: 52px;
        }
        .filter-btn.active { border-color: #ffaa00; background: #2a2200; }
        .filter-thumb {
            width: 40px; height: 40px; border-radius: 5px;
            overflow: hidden; background: #333;
        }
        .filter-thumb canvas { width: 100%; height: 100%; display: block; }
        .filter-label { font-size: 8px; color: #aaa; text-align: center; letter-spacing: 0.5px; }
        .filter-btn.active .filter-label { color: #ffaa00; }

        /* ── Bottom bar ── */
        .bottom-bar {
            flex-shrink: 0; display: flex; align-items: center;
            justify-content: space-between; padding: 0 4px;
        }
        .shutter-btn {
            background: radial-gradient(circle, #e67e22, #c0392b);
            border: 3px solid #922b21; color: white;
            width: 64px; height: 64px; font-size: 22px; border-radius: 50%;
            cursor: pointer; box-shadow: 0 5px 0 #6e1f16, 0 8px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease; display: flex; align-items: center; justify-content: center;
        }
        .shutter-btn:active { box-shadow: 0 1px 0 #6e1f16; transform: translateY(4px); }
        .shutter-btn:disabled { opacity: 0.4; transform: none; }
        .side-btn {
            background: #222; border: 1.5px solid #444; color: #aaa;
            width: 44px; height: 44px; border-radius: 50%; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.15s; position: relative;
        }
        .side-btn:active { background: #333; }
        /* Badge số ảnh trên nút gallery */
        .gallery-badge {
            position: absolute; top: -4px; right: -4px;
            background: #ff3333; color: #fff;
            font-size: 9px; font-weight: bold;
            width: 16px; height: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            display: none;
        }
        #status {
            font-size: 10px; color: #ffaa00; text-align: center;
            flex-shrink: 0; letter-spacing: 1px; min-height: 14px;
        }

        /* ══════════════════════════════════════
           GALLERY OVERLAY
        ══════════════════════════════════════ */
        #gallery-overlay {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 100;
            flex-direction: column;
        }
        #gallery-overlay.open { display: flex; }
        .gallery-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 16px 10px;
            border-bottom: 1px solid #222;
        }
        .gallery-title { font-size: 13px; color: #ffaa00; letter-spacing: 2px; }
        .gallery-close {
            background: #222; border: 1.5px solid #444; color: #fff;
            width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        /* Grid thumbnail */
        .gallery-grid {
            flex: 1; overflow-y: auto; padding: 8px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
        }
        .gallery-thumb {
            aspect-ratio: 1; overflow: hidden; cursor: pointer; border-radius: 3px;
            position: relative; background: #111;
        }
        .gallery-thumb img {
            width: 100%; height: 100%; object-fit: cover;
            display: block; transition: opacity 0.1s;
        }
        .gallery-thumb:active img { opacity: 0.7; }
        .gallery-thumb .thumb-idx {
            position: absolute; bottom: 3px; right: 4px;
            font-size: 8px; color: rgba(255,255,255,0.6);
        }
        /* Fullscreen viewer */
        #photo-viewer {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 200;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #photo-viewer.open { display: flex; }
        #viewer-img {
            max-width: 100%; max-height: calc(100vh - 80px);
            object-fit: contain; border-radius: 4px;
        }
        .viewer-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: linear-gradient(transparent, rgba(0,0,0,0.8));
        }
        .viewer-btn {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 12px;
            cursor: pointer; font-family: 'Courier New', monospace;
        }
        .viewer-btn:active { background: rgba(255,255,255,0.22); }
        .viewer-counter { font-size: 11px; color: #aaa; letter-spacing: 1px; }
        .viewer-back {
            position: absolute; top: 14px; left: 14px;
            background: rgba(0,0,0,0.5); border: 1px solid #444;
            color: #fff; width: 36px; height: 36px; border-radius: 50%;
            font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>

// LUT curves
function buildLUT(type) {
    const lut = new Uint8Array(256);
    for (let i=0;i<256;i++) {
        const t=i/255; let v;
        if      (type==='flat')     v=t<0.5?2*t*t*0.4+t*0.6:(1-Math.pow(-2*t+2,2)/2)*0.4+t*0.6;
        else if (type==='soft_s')   v=t<0.5?2*t*t*0.6+t*0.4:(1-Math.pow(-2*t+2,2)/2)*0.6+t*0.4;
        else if (type==='punchy_s') v=t<0.5?2*t*t*0.75+t*0.25:(1-Math.pow(-2*t+2,2)/2)*0.75+t*0.25;
        else if (type==='bw_s')     v=t<0.5?2*t*t*0.80+t*0.20:(1-Math.pow(-2*t+2,2)/2)*0.80+t*0.20;
        else v=t;
        lut[i]=Math.min(255,Math.round(v*255));
    }
    return lut;
}
const LUTS={};['flat','soft_s','punchy_s','bw_s'].forEach(k=>LUTS[k]=buildLUT(k));

// ═══════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════
async function initCamera(facing) {
    if (activeStream) activeStream.getTracks().forEach(t=>t.stop());
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video:{ facingMode:facing, width:{ideal:1920}, height:{ideal:1080} }, audio:false
        });
        activeStream = stream;
        video.srcObject = stream;
        // Check for native zoom support
        zoomTrack = stream.getVideoTracks()[0];
        const caps = zoomTrack.getCapabilities?.() || {};
        if (caps.zoom) {
            zoomSlider.min   = caps.zoom.min;
            zoomSlider.max   = caps.zoom.max;
            zoomSlider.step  = caps.zoom.step || 0.1;
            zoomSlider.value = caps.zoom.min;
            currentZoom = caps.zoom.min;
        } else {
            // fallback: CSS scale zoom
            zoomTrack = null;
            zoomSlider.min = 1; zoomSlider.max = 5; zoomSlider.step = 0.1; zoomSlider.value = 1;
            currentZoom = 1;
        }
        updateZoomUI(currentZoom);
        statusEl.textContent = 'READY TO SHOOT';
    } catch {
        try {
            const s = await navigator.mediaDevices.getUserMedia({ video:{width:{ideal:1920},height:{ideal:1080}}, audio:false });
            activeStream=s; video.srcObject=s; zoomTrack=null;
            statusEl.textContent='READY (FALLBACK)';
        } catch { statusEl.textContent='CAMERA ERROR'; alert('Vui lòng cấp quyền camera!'); }
    }
}

// ═══════════════════════════════════════
//  ZOOM
// ═══════════════════════════════════════
function updateZoomUI(z) {
    zoomLabel.textContent = z.toFixed(1) + '×';
    const min = parseFloat(zoomSlider.min), max = parseFloat(zoomSlider.max);
    const pct = ((z - min) / (max - min)) * 100;
    zoomSlider.style.setProperty('--pct', pct + '%');
    zoomSlider.value = z;
}

async function setZoom(z) {
    const min = parseFloat(zoomSlider.min), max = parseFloat(zoomSlider.max);
    z = Math.max(min, Math.min(max, z));
    currentZoom = z;
    updateZoomUI(z);
    if (zoomTrack) {
        // Native camera zoom (Android Chrome supports this)
        try { await zoomTrack.applyConstraints({ advanced:[{ zoom: z }] }); } catch {}
    } else {
        // CSS scale fallback — zoom in from center
        video.style.transform = facingMode==='user'
            ? `scaleX(-1) scale(${z})`
            : `scale(${z})`;
    }
}

zoomSlider.addEventListener('input', () => setZoom(parseFloat(zoomSlider.value)));
zoomIn.addEventListener('click',  () => setZoom(currentZoom + 0.5));
zoomOut.addEventListener('click', () => setZoom(currentZoom - 0.5));

// Pinch-to-zoom on viewfinder
let pinchStartDist = 0, pinchStartZoom = 1;
const vf = document.getElementById('viewfinder');
vf.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
        pinchStartDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        pinchStartZoom = currentZoom;
    }
}, { passive: true });
vf.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
        const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        const scale = dist / pinchStartDist;
        setZoom(pinchStartZoom * scale);
    }
}, { passive: true });

// ═══════════════════════════════════════
//  FLIP CAMERA
// ═══════════════════════════════════════
flipBtn.addEventListener('click', () => {
    facingMode = facingMode==='environment' ? 'user' : 'environment';
    initCamera(facingMode);
    video.classList.toggle('mirrored', facingMode==='user');
});

// ═══════════════════════════════════════
//  FILTER STRIP
// ═══════════════════════════════════════
function drawSampleToCanvas(c) {
    const cx=c.getContext('2d'), w=c.width, h=c.height;
    const grd=cx.createLinearGradient(0,0,w,h);
    grd.addColorStop(0,'#c87941'); grd.addColorStop(0.3,'#8db36a');
    grd.addColorStop(0.6,'#4a7ba8'); grd.addColorStop(1,'#2a3a5a');
    cx.fillStyle=grd; cx.fillRect(0,0,w,h);
    cx.fillStyle='rgba(255,220,160,0.6)';
    cx.beginPath(); cx.ellipse(w*0.55,h*0.45,w*0.18,h*0.25,0,0,Math.PI*2); cx.fill();
}
FILMS.forEach((film,idx) => {
    // Thêm divider phân tách nhóm Fujifilm
    if (film.fuji && (idx === 0 || !FILMS[idx-1].fuji)) {
        const div = document.createElement('div');
        div.style.cssText = 'flex-shrink:0;display:flex;align-items:center;padding:0 4px;';
        div.innerHTML = '<span style="font-size:9px;color:#4a9eff;letter-spacing:1px;writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;">FUJI</span>';
        filterStrip.appendChild(div);
    }
    const btn=document.createElement('div');
    btn.className='filter-btn'+(idx===0?' active':'');
    const thumb=document.createElement('div'); thumb.className='filter-thumb';
    const tc=document.createElement('canvas'); tc.width=40; tc.height=40;
    drawSampleToCanvas(tc); tc.style.filter=film.liveFilter;
    thumb.appendChild(tc);
    const lbl=document.createElement('div'); lbl.className='filter-label';
    // Fuji presets: show tên ngắn + badge xanh
    if (film.fuji) {
        lbl.innerHTML = `<span style="color:#4a9eff">${film.short}</span>`;
    } else {
        lbl.textContent=film.short;
    }
    btn.appendChild(thumb); btn.appendChild(lbl);
    filterStrip.appendChild(btn);
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentFilm=FILMS[idx];
        filmNameEl.textContent = film.fuji ? `📷 ${film.name}` : film.name;
        video.style.filter=film.liveFilter;
        statusEl.textContent=film.name.toUpperCase();
    });
});
video.style.filter=FILMS[0].liveFilter;

// ═══════════════════════════════════════
//  IMAGE PROCESSING
// ═══════════════════════════════════════
function applyGrade(data,film) {
    const {rMul,gMul,bMul,rLift,gLift,bLift}=film.grade;
    // colorCast: thêm lệch màu đặc trưng của từng film simulation
    const cc = film.colorCast || null;
    const ccR = cc ? cc.r : 0;
    const ccG = cc ? cc.g : 0;
    const ccB = cc ? cc.b : 0;
    for(let i=0;i<data.length;i+=4){
        data[i]  =Math.min(255,Math.max(0, data[i]  *rMul*0.92+rLift+ccR));
        data[i+1]=Math.min(255,Math.max(0, data[i+1]*gMul*0.92+gLift+ccG));
        data[i+2]=Math.min(255,Math.max(0, data[i+2]*bMul*0.92+bLift+ccB));
    }
}
function applyBW(data) {
    for(let i=0;i<data.length;i+=4){
        const l=data[i]*0.299+data[i+1]*0.587+data[i+2]*0.114;
        data[i]=data[i+1]=data[i+2]=l;
    }
}
function applyCurve(data,lut){ for(let i=0;i<data.length;i+=4){data[i]=lut[data[i]];data[i+1]=lut[data[i+1]];data[i+2]=lut[data[i+2]];} }
function applyGrain(data,g){ for(let i=0;i<data.length;i+=4){const n=(Math.random()-0.5)*g;data[i]=Math.min(255,Math.max(0,data[i]+n));data[i+1]=Math.min(255,Math.max(0,data[i+1]+n));data[i+2]=Math.min(255,Math.max(0,data[i+2]+n));} }
function applyHalation(w,h,hal){
    if(!hal) return;
    const hx=ctx.createRadialGradient(w*0.5,h*0.2,0,w*0.5,h*0.2,w*0.6);
    hx.addColorStop(0,`rgba(${hal.r},${hal.g},${hal.b},${hal.strength})`);
    hx.addColorStop(1,`rgba(${hal.r},${hal.g},${hal.b},0)`);
    ctx.globalCompositeOperation='screen'; ctx.fillStyle=hx; ctx.fillRect(0,0,w,h);
    ctx.globalCompositeOperation='source-over';
}
function applyVignette(w,h,film){
    const vg=ctx.createRadialGradient(w/2,h/2,w*film.vignetteInner,w/2,h/2,w*film.vignetteOuter);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,`rgba(0,0,0,${film.vignetteAlpha})`);
    ctx.fillStyle=vg; ctx.fillRect(0,0,w,h);
}
function applyPolaroidBorder(w,h){
    const t=Math.floor(w*0.05), bot=Math.floor(w*0.18);
    ctx.fillStyle='#f5f0e8';
    ctx.fillRect(0,0,w,t); ctx.fillRect(0,0,t,h); ctx.fillRect(w-t,0,t,h); ctx.fillRect(0,h-bot,w,bot);
}
function drawDateStamp(w,h,film){
    if(!showStamp) return;
    const now=new Date();
    const stamp=`'${String(now.getFullYear()).slice(-2)} ${String(now.getMonth()+1).padStart(2,'0')} ${String(now.getDate()).padStart(2,'0')}`;
    const fs=Math.floor(w*0.042);
    ctx.font=`bold ${fs}px "Courier New",monospace`;
    ctx.fillStyle=film.stampColor; ctx.shadowColor=film.stampShadow; ctx.shadowBlur=fs*0.3;
    const tw=ctx.measureText(stamp).width;
    ctx.fillText(stamp, w-tw-w*0.04, film.border? h-w*0.18-h*0.02 : h-h*0.04);
    ctx.shadowBlur=0;
}

// ═══════════════════════════════════════
//  FLASH
// ═══════════════════════════════════════
function triggerFlash(){
    flashOverlay.style.transition='opacity 0.04s ease-in'; flashOverlay.style.opacity='0.9';
    setTimeout(()=>{ flashOverlay.style.transition='opacity 0.4s ease-out'; flashOverlay.style.opacity='0'; },70);
}

// ═══════════════════════════════════════
//  SAVE
// ═══════════════════════════════════════
async function savePhoto(blob, filename) {
    const file=new File([blob],filename,{type:'image/jpeg'});
    if(navigator.share&&navigator.canShare?.({files:[file]})){
        try{ await navigator.share({files:[file],title:'Retro Photo'}); return; }
        catch(e){ if(e.name==='AbortError') return; }
    }
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
}

// ═══════════════════════════════════════
//  GALLERY
// ═══════════════════════════════════════
function addToGallery(url, blob, filename, filmName) {
    photoRoll.push({ url, blob, filename, filmName });
    // Update badge
    const n = photoRoll.length;
    galleryBadge.textContent = n;
    galleryBadge.style.display = 'flex';
    // Add thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'gallery-thumb';
    thumb.dataset.idx = n - 1;
    const img = document.createElement('img');
    img.src = url; img.loading = 'lazy';
    const idx = document.createElement('span');
    idx.className = 'thumb-idx'; idx.textContent = n;
    thumb.appendChild(img); thumb.appendChild(idx);
    thumb.addEventListener('click', () => openViewer(parseInt(thumb.dataset.idx)));
    galleryGrid.insertBefore(thumb, galleryGrid.firstChild); // newest first
    galleryCount.textContent = n + ' SHOTS';
}

galleryBtn.addEventListener('click', () => {
    if (photoRoll.length === 0) { statusEl.textContent = 'NO PHOTOS YET'; return; }
    galleryOverlay.classList.add('open');
});
galleryClose.addEventListener('click', () => galleryOverlay.classList.remove('open'));

// ═══════════════════════════════════════
//  PHOTO VIEWER
// ═══════════════════════════════════════
function openViewer(idx) {
    viewerIdx = idx;
    renderViewer();
    galleryOverlay.classList.remove('open');
    photoViewer.classList.add('open');
}

function renderViewer() {
    const p = photoRoll[viewerIdx];
    viewerImg.src = p.url;
    viewerCounter.textContent = `${viewerIdx+1} / ${photoRoll.length}  [${p.filmName}]`;
    viewerPrev.style.opacity = viewerIdx > 0 ? '1' : '0.3';
    viewerNext.style.opacity = viewerIdx < photoRoll.length-1 ? '1' : '0.3';
}

viewerBack.addEventListener('click', () => {
    photoViewer.classList.remove('open');
    galleryOverlay.classList.add('open');
});
viewerPrev.addEventListener('click', () => { if(viewerIdx>0){ viewerIdx--; renderViewer(); } });
viewerNext.addEventListener('click', () => { if(viewerIdx<photoRoll.length-1){ viewerIdx++; renderViewer(); } });
viewerSave.addEventListener('click', () => {
    const p = photoRoll[viewerIdx];
    savePhoto(p.blob, p.filename);
});

// Swipe left/right in viewer
let swipeX = 0;
viewerImg.addEventListener('touchstart', e => { swipeX = e.touches[0].clientX; }, { passive:true });
viewerImg.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - swipeX;
    if (Math.abs(dx) > 50) {
        if (dx < 0 && viewerIdx < photoRoll.length-1) { viewerIdx++; renderViewer(); }
        if (dx > 0 && viewerIdx > 0)                  { viewerIdx--; renderViewer(); }
    }
});

// ═══════════════════════════════════════
//  SHUTTER
// ═══════════════════════════════════════
captureBtn.addEventListener('click', async function() {
    // Nếu đang review → đóng preview, tiếp tục chụp
    if (isReviewing) {
        preview.style.display='none';
        isReviewing=false;
        statusEl.textContent='READY TO SHOOT';
        captureBtn.textContent='📸';
        return;
    }

    captureBtn.disabled=true;
    statusEl.textContent='DEVELOPING FILM...';
    triggerFlash();
    await new Promise(r=>setTimeout(r,60));

    const film=currentFilm;
    canvas.width  = video.videoWidth  || 1280;
    canvas.height = video.videoHeight || 720;

    ctx.filter='none';
    if (facingMode==='user') {
        ctx.save(); ctx.translate(canvas.width,0); ctx.scale(-1,1);
        ctx.drawImage(video,0,0,canvas.width,canvas.height); ctx.restore();
    } else {
        ctx.drawImage(video,0,0,canvas.width,canvas.height);
    }

    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const data=imageData.data;
    if (film.id==='ilford') { applyBW(data); }
    else { applyGrade(data,film); }
    applyCurve(data,LUTS[film.curve]);
    applyGrain(data,film.grain);
    ctx.putImageData(imageData,0,0);

    applyHalation(canvas.width,canvas.height,film.halation);
    applyVignette(canvas.width,canvas.height,film);
    if (film.border) applyPolaroidBorder(canvas.width,canvas.height);
    drawDateStamp(canvas.width,canvas.height,film);

    canvas.toBlob(async(blob)=>{
        if(!blob){ statusEl.textContent='ERROR'; captureBtn.disabled=false; return; }

        const filename=`${film.short}_${Date.now()}.jpg`;
        const url=URL.createObjectURL(blob);

        // Hiển thị preview ngay trên viewfinder
        preview.src=url;
        preview.style.display='block';
        isReviewing=true;

        photoCount++;
        counterEl.textContent=String(photoCount).padStart(2,'0');
        // Thêm vào gallery roll
        addToGallery(url, blob, filename, film.name);

        statusEl.textContent='✓ TAP TO SHOOT AGAIN  |  🖼️ VIEW ROLL';
        captureBtn.textContent='🔄';
        captureBtn.disabled=false;

        // Save tự động
        await savePhoto(blob,filename);
    },'image/jpeg',0.93);
});

window.addEventListener('beforeunload',()=>{ if(activeStream) activeStream.getTracks().forEach(t=>t.stop()); });
window.addEventListener('load',()=>initCamera(facingMode));
</script>
