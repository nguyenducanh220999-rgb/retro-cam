<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Camera</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .camera-body {
            background: linear-gradient(160deg, #2a2a2a, #1a1a1a);
            border: 3px solid #3a3a3a;
            border-radius: 18px;
            padding: 12px 12px 10px;
            box-shadow: inset 0 0 12px #000, 0 12px 30px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 420px;
            height: 97vh;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ── Top bar ── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .led-display {
            background: #000;
            color: #ff3333;
            font-size: 13px;
            padding: 4px 8px;
            border-radius: 3px;
            font-weight: bold;
            border: 1px solid #2a2a2a;
            box-shadow: inset 0 0 4px #ff000066;
            letter-spacing: 1px;
        }
        .film-name {
            font-size: 11px;
            color: #ffaa00;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ── Viewfinder ── */
        .viewfinder {
            flex: 1;
            border: 2px solid #000;
            background: #111;
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            min-height: 0;
        }
        #webcam, #preview {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }
        #preview {
            display: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 2;
        }
        /* CSS live preview filter on viewfinder */
        #webcam { filter: var(--live-filter, none); transition: filter 0.3s; }

        #flash-overlay {
            position: absolute; inset: 0;
            background: white; opacity: 0;
            z-index: 10; pointer-events: none;
        }

        /* corner brackets */
        .viewfinder::before, .viewfinder::after,
        .vf-br::before, .vf-br::after {
            content: '';
            position: absolute;
            width: 16px; height: 16px;
            border-color: rgba(255,255,255,0.35);
            border-style: solid;
            z-index: 5;
        }
        .viewfinder::before  { top:6px;  left:6px;  border-width: 2px 0 0 2px; }
        .viewfinder::after   { top:6px;  right:6px; border-width: 2px 2px 0 0; }
        .vf-br::before { bottom:6px; left:6px;  border-width: 0 0 2px 2px; }
        .vf-br::after  { bottom:6px; right:6px; border-width: 0 2px 2px 0; }

        /* ── Filter strip ── */
        .filter-strip {
            flex-shrink: 0;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding: 2px 0 4px;
            scrollbar-width: none;
        }
        .filter-strip::-webkit-scrollbar { display: none; }

        .filter-btn {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            border: 1.5px solid transparent;
            background: #222;
            transition: border-color 0.15s, background 0.15s;
            min-width: 52px;
        }
        .filter-btn.active {
            border-color: #ffaa00;
            background: #2a2200;
        }
        .filter-thumb {
            width: 40px; height: 40px;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            background: #333;
        }
        .filter-thumb canvas {
            width: 100%; height: 100%;
            display: block;
        }
        .filter-label {
            font-size: 8px;
            color: #aaa;
            text-align: center;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }
        .filter-btn.active .filter-label { color: #ffaa00; }

        /* ── Bottom controls ── */
        .bottom-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }

        .shutter-btn {
            background: radial-gradient(circle, #e67e22, #c0392b);
            border: 3px solid #922b21;
            color: white;
            width: 64px; height: 64px;
            font-size: 22px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 5px 0 #6e1f16, 0 8px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            display: flex; align-items: center; justify-content: center;
        }
        .shutter-btn:active {
            box-shadow: 0 1px 0 #6e1f16;
            transform: translateY(4px);
        }
        .shutter-btn:disabled { opacity: 0.4; transform: none; }

        .side-btn {
            background: #222;
            border: 1.5px solid #444;
            color: #aaa;
            width: 44px; height: 44px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s;
        }
        .side-btn:active { background: #333; }

        #status {
            font-size: 10px;
            color: #ffaa00;
            text-align: center;
            flex-shrink: 0;
            letter-spacing: 1px;
            min-height: 14px;
        }
    </style>
</head>

// ═══════════════════════════════════════════════
//  CURVE LOOKUP TABLES
// ═══════════════════════════════════════════════
function buildLUT(type) {
    const lut = new Uint8Array(256);
    for (let i = 0; i < 256; i++) {
        const t = i / 255;
        let v;
        if (type === 'flat') {
            // Gentle S — very soft
            v = t < 0.5 ? 2*t*t*0.4 + t*0.6 : (1 - Math.pow(-2*t+2,2)/2)*0.4 + t*0.6;
        } else if (type === 'soft_s') {
            v = t < 0.5 ? 2*t*t*0.6 + t*0.4 : (1 - Math.pow(-2*t+2,2)/2)*0.6 + t*0.4;
        } else if (type === 'punchy_s') {
            v = t < 0.5 ? 2*t*t*0.75 + t*0.25 : (1 - Math.pow(-2*t+2,2)/2)*0.75 + t*0.25;
        } else if (type === 'bw_s') {
            // High-contrast B&W
            v = t < 0.5 ? 2*t*t*0.80 + t*0.20 : (1 - Math.pow(-2*t+2,2)/2)*0.80 + t*0.20;
        } else {
            v = t;
        }
        lut[i] = Math.min(255, Math.round(v * 255));
    }
    return lut;
}
const LUTS = {};
['flat','soft_s','punchy_s','bw_s'].forEach(k => LUTS[k] = buildLUT(k));

// ═══════════════════════════════════════════════
//  CAMERA INIT
// ═══════════════════════════════════════════════
async function initCamera(facing) {
    if (activeStream) activeStream.getTracks().forEach(t => t.stop());
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: facing, width:{ideal:1920}, height:{ideal:1080} },
            audio: false
        });
        activeStream = stream;
        video.srcObject = stream;
        statusEl.textContent = 'READY TO SHOOT';
    } catch {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width:{ideal:1920}, height:{ideal:1080} }, audio: false
            });
            activeStream = stream;
            video.srcObject = stream;
            statusEl.textContent = 'READY (FALLBACK)';
        } catch {
            statusEl.textContent = 'CAMERA ERROR';
            alert('Vui lòng cấp quyền camera!');
        }
    }
}

});

//  FILTER STRIP — build thumbnails
// ═══════════════════════════════════════════════
// Small sample image for thumbnails (warm indoor scene gradient)
function drawSampleToCanvas(c) {
    const cx = c.getContext('2d');
    const w = c.width, h = c.height;
    const grd = cx.createLinearGradient(0,0,w,h);
    grd.addColorStop(0,   '#c87941');
    grd.addColorStop(0.3, '#8db36a');
    grd.addColorStop(0.6, '#4a7ba8');
    grd.addColorStop(1,   '#2a3a5a');
    cx.fillStyle = grd;
    cx.fillRect(0,0,w,h);
    // fake "subject"
    cx.fillStyle = 'rgba(255,220,160,0.6)';
    cx.beginPath(); cx.ellipse(w*0.55, h*0.45, w*0.18, h*0.25, 0, 0, Math.PI*2); cx.fill();
}

    const tc = document.createElement('canvas');
    tc.width = 40; tc.height = 40;

    // Apply CSS filter for quick thumbnail preview

    lbl.textContent = film.short;

    btn.appendChild(thumb);

        video.style.setProperty('--live-filter', film.liveFilter);

        statusEl.textContent = film.name.toUpperCase();

// ═══════════════════════════════════════════════
//  IMAGE PROCESSING
// ═══════════════════════════════════════════════
function applyGrade(data, film) {
    const { rMul, gMul, bMul, rLift, gLift, bLift } = film.grade;
    for (let i = 0; i < data.length; i += 4) {
        data[i]   = Math.min(255, data[i]   * rMul * 0.92 + rLift);
        data[i+1] = Math.min(255, data[i+1] * gMul * 0.92 + gLift);
        data[i+2] = Math.min(255, data[i+2] * bMul * 0.92 + bLift);
    }
}

function applyBW(data) {
    for (let i = 0; i < data.length; i += 4) {
        const lum = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
        data[i] = data[i+1] = data[i+2] = lum;
    }
}

function applyCurve(data, lut) {
    for (let i = 0; i < data.length; i += 4) {
        data[i]   = lut[data[i]];
        data[i+1] = lut[data[i+1]];
        data[i+2] = lut[data[i+2]];
    }
}

function applyGrain(data, intensity) {
    for (let i = 0; i < data.length; i += 4) {
        const g = (Math.random()-0.5) * intensity;
        data[i]   = Math.min(255, Math.max(0, data[i]+g));
        data[i+1] = Math.min(255, Math.max(0, data[i+1]+g));
        data[i+2] = Math.min(255, Math.max(0, data[i+2]+g));
    }
}

// Halation: soft highlight bleed (characteristic of film)
function applyHalation(w, h, halation) {
    if (!halation) return;
    const { r, g, b, strength } = halation;
    // Draw a soft radial highlight in center-top
    const hx = ctx.createRadialGradient(w*0.5, h*0.2, 0, w*0.5, h*0.2, w*0.6);
    hx.addColorStop(0, `rgba(${r},${g},${b},${strength})`);
    hx.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = hx;
    ctx.fillRect(0, 0, w, h);
    ctx.globalCompositeOperation = 'source-over';
}

function applyVignette(w, h, film) {
    const vg = ctx.createRadialGradient(
        w/2, h/2, w * film.vignetteInner,
        w/2, h/2, w * film.vignetteOuter
    );
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, `rgba(0,0,0,${film.vignetteAlpha})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, w, h);
}

function applyPolaroidBorder(w, h) {
    // Classic Polaroid: thin top/sides, thick bottom
    const t = Math.floor(w * 0.05);
    const bot = Math.floor(w * 0.18);
    ctx.fillStyle = '#f5f0e8';
    ctx.fillRect(0, 0, w, t);          // top
    ctx.fillRect(0, 0, t, h);          // left
    ctx.fillRect(w-t, 0, t, h);        // right
    ctx.fillRect(0, h-bot, w, bot);    // bottom
}

function drawDateStamp(w, h, film) {
    if (!showStamp) return;
    const now = new Date();
    const yy = String(now.getFullYear()).slice(-2);
    const mm = String(now.getMonth()+1).padStart(2,'0');
    const dd = String(now.getDate()).padStart(2,'0');
    const stamp = `'${yy} ${mm} ${dd}`;
    const fs = Math.floor(w * 0.042);
    ctx.font = `bold ${fs}px "Courier New", monospace`;
    ctx.fillStyle   = film.stampColor;
    ctx.shadowColor = film.stampShadow;
    ctx.shadowBlur  = fs * 0.3;
    const tw = ctx.measureText(stamp).width;
    const px = w - tw - w*0.04;
    const py = film.border ? h - w*0.18 - h*0.02 : h - h*0.04;
    ctx.fillText(stamp, px, py);
    ctx.shadowBlur = 0;
}

// ═══════════════════════════════════════════════
//  FLASH
// ═══════════════════════════════════════════════
function triggerFlash() {
    flashOverlay.style.transition = 'opacity 0.04s ease-in';
    flashOverlay.style.opacity = '0.9';
    setTimeout(() => {
        flashOverlay.style.transition = 'opacity 0.4s ease-out';
        flashOverlay.style.opacity = '0';
    }, 70);
}

// ═══════════════════════════════════════════════
//  SAVE (Web Share API → fallback download)
// ═══════════════════════════════════════════════
async function savePhoto(blob, filename) {
    const file = new File([blob], filename, { type:'image/jpeg' });
    if (navigator.share && navigator.canShare?.({ files:[file] })) {
        try { await navigator.share({ files:[file], title:'Retro Photo' }); return; }
        catch(e) { if (e.name==='AbortError') return; }
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ═══════════════════════════════════════════════
//  SHUTTER
// ═══════════════════════════════════════════════
captureBtn.addEventListener('click', async function() {
    if (isReviewing) {
        preview.style.display = 'none';
        isReviewing = false;
        statusEl.textContent = 'READY TO SHOOT';
        captureBtn.textContent = '📸';
        return;
    }

    captureBtn.disabled = true;
    statusEl.textContent = 'DEVELOPING FILM...';
    triggerFlash();
    await new Promise(r => setTimeout(r, 60));

    const film = currentFilm;
    canvas.width  = video.videoWidth  || 1280;
    canvas.height = video.videoHeight || 720;

    // Reset any filter before drawing
    ctx.filter = 'none';
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    if (film.id === 'ilford_hp5') {
        applyBW(data);
        applyCurve(data, LUTS[film.curve]);
        applyGrain(data, film.grain);
    } else {
        applyGrade(data, film);
        applyCurve(data, LUTS[film.curve]);
        applyGrain(data, film.grain);
    }

    ctx.putImageData(imageData, 0, 0);

    // Post-pixel canvas effects
    applyHalation(canvas.width, canvas.height, film.halation);
    applyVignette(canvas.width, canvas.height, film);
    if (film.border) applyPolaroidBorder(canvas.width, canvas.height);
    drawDateStamp(canvas.width, canvas.height, film);

    canvas.toBlob(async (blob) => {
        if (!blob) {
            statusEl.textContent = 'ERROR: DEVELOP FAILED';
            captureBtn.disabled = false;
            return;
        }
        const filename = `${film.short}_${Date.now()}.jpg`;
        const url = URL.createObjectURL(blob);

        preview.src = url;
        preview.style.display = 'block';
        isReviewing = true;
        photoCount++;
        counterEl.textContent = String(photoCount).padStart(2,'0');
        statusEl.textContent = 'SAVED! TAP TO SHOOT AGAIN';
        captureBtn.textContent = '🔄';
        captureBtn.disabled = false;

        await savePhoto(blob, filename);
    }, 'image/jpeg', 0.93);
});

window.addEventListener('beforeunload', () => {
    if (activeStream) activeStream.getTracks().forEach(t => t.stop());
});

window.addEventListener('load', () => initCamera(facingMode));
</script>
