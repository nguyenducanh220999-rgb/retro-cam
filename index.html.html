<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Camera Y2K</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .camera-body {
            background: linear-gradient(145deg, #2c2c2c, #1e1e1e);
            border: 4px solid #3a3a3a;
            border-radius: 15px;
            padding: 20px;
            box-shadow: inset 0 0 10px #000, 0 10px 25px rgba(0,0,0,0.7);
            width: 100%;
            max-width: 450px;
            height: 95vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .led-display {
            background-color: #000;
            color: #ff3333;
            font-size: 18px;
            padding: 5px 10px;
            border-radius: 3px;
            display: inline-block;
            font-weight: bold;
            border: 1px solid #333;
            margin-bottom: 10px;
            box-shadow: inset 0 0 5px #ff0000;
        }

        .viewfinder {
            width: 100%;
            flex-grow: 1;
            border: 3px solid #000;
            background-color: #222;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 5px;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
        }

        /* Flash overlay khi chụp */
        #flash-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.05s ease-in;
        }

        .shutter-btn {
            background: radial-gradient(circle, #e67e22, #d35400);
            border: 3px solid #a04000;
            color: white;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #803300, 0 8px 15px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 5px;
        }

        .shutter-btn:active {
            box-shadow: 0 1px 0 #803300, 0 2px 5px rgba(0,0,0,0.5);
            transform: translateY(4px);
        }

        .shutter-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            font-size: 12px;
            color: #ffaa00;
            margin: 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="camera-body">
        <div class="led-display">FILM COUNTER: <span id="counter">00</span></div>

        <div class="viewfinder">
            <video id="webcam" autoplay playsinline muted></video>
            <img id="preview" alt="Retro Preview">
            <div id="flash-overlay"></div>
        </div>

        <button class="shutter-btn" id="capture-btn">📸 SHUTTER</button>

        <p id="status">INITIALIZING LENS...</p>
    </div>

    <canvas id="processing-canvas" style="display: none;"></canvas>

    <script>
        const video       = document.getElementById('webcam');
        const preview     = document.getElementById('preview');
        const captureBtn  = document.getElementById('capture-btn');
        const counterEl   = document.getElementById('counter');
        const status      = document.getElementById('status');
        const canvas      = document.getElementById('processing-canvas');
        const ctx         = canvas.getContext('2d');
        const flashOverlay = document.getElementById('flash-overlay');

        let photoCount  = 0;
        let isReviewing = false;
        let activeStream = null; // FIX: lưu stream để dừng đúng cách

        // ─── FIX 1: bỏ "exact" để tránh OverconstrainedError,
        //            thêm ideal resolution để lấy ảnh chất lượng cao ───
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',          // không dùng exact
                        width:  { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                });
                activeStream = stream;
                video.srcObject = stream;
                status.innerText = 'READY TO SHOOT';
            } catch (err) {
                // Fallback: bất kỳ camera nào có sẵn (PC / front cam)
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 1920 }, height: { ideal: 1080 } },
                        audio: false
                    });
                    activeStream = fallbackStream;
                    video.srcObject = fallbackStream;
                    status.innerText = 'READY TO SHOOT (FALLBACK)';
                } catch (e) {
                    status.innerText = 'CAMERA ERROR: PERMISSION DENIED';
                    alert('Vui lòng cấp quyền truy cập Camera trong cài đặt hệ thống!');
                }
            }
        }

        // ─── FIX 2: film grain (noise ngẫu nhiên per-pixel) ───
        function applyFilmGrain(data, intensity = 28) {
            for (let i = 0; i < data.length; i += 4) {
                const grain = (Math.random() - 0.5) * intensity;
                data[i]     = Math.min(255, Math.max(0, data[i]     + grain));
                data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + grain));
                data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + grain));
            }
        }

        // ─── FIX 3: vignette (tối dần 4 góc) ───
        function applyVignette(w, h) {
            const vg = ctx.createRadialGradient(w / 2, h / 2, w * 0.28, w / 2, h / 2, w * 0.78);
            vg.addColorStop(0, 'rgba(0,0,0,0)');
            vg.addColorStop(1, 'rgba(0,0,0,0.62)');
            ctx.fillStyle = vg;
            ctx.fillRect(0, 0, w, h);
        }

        // ─── FIX 4: S-curve contrast đơn giản dùng lookup table ───
        function buildSCurveLUT() {
            const lut = new Uint8Array(256);
            for (let i = 0; i < 256; i++) {
                const t = i / 255;
                // Smooth S-curve: giữ mid-tone, boost contrast nhẹ ở shadow/highlight
                const curved = t < 0.5
                    ? 2 * t * t
                    : 1 - Math.pow(-2 * t + 2, 2) / 2;
                // Blend 60% curve + 40% linear để không quá mạnh
                lut[i] = Math.min(255, Math.round((curved * 0.6 + t * 0.4) * 255));
            }
            return lut;
        }

        function applySCurve(data, lut) {
            for (let i = 0; i < data.length; i += 4) {
                data[i]     = lut[data[i]];
                data[i + 1] = lut[data[i + 1]];
                data[i + 2] = lut[data[i + 2]];
            }
        }

        const sCurveLUT = buildSCurveLUT(); // tính 1 lần, dùng nhiều lần

        // ─── Flash animation khi chụp ───
        function triggerFlash() {
            flashOverlay.style.transition = 'opacity 0.05s ease-in';
            flashOverlay.style.opacity = '0.85';
            setTimeout(() => {
                flashOverlay.style.transition = 'opacity 0.35s ease-out';
                flashOverlay.style.opacity = '0';
            }, 80);
        }

        // ─── FIX 5: lưu ảnh đúng cách trên Android (Web Share API) ───
        async function savePhoto(blob, filename) {
            const file = new File([blob], filename, { type: 'image/jpeg' });

            // Web Share API — hoạt động trên Android Chrome / Capacitor WebView
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Retro Photo',
                    });
                    return;
                } catch (shareErr) {
                    // Người dùng huỷ share → không báo lỗi, fall through
                    if (shareErr.name === 'AbortError') return;
                }
            }

            // Fallback cho PC / browser không hỗ trợ Share API
            const url = URL.createObjectURL(blob);
            const a   = document.createElement('a');
            a.href     = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        // ─── Xử lý nút chụp ───
        captureBtn.addEventListener('click', async function () {

            if (isReviewing) {
                // Quay lại màn hình live camera
                preview.style.display = 'none';
                isReviewing = false;
                status.innerText    = 'READY TO SHOOT';
                captureBtn.textContent = '📸 SHUTTER';
                return;
            }

            captureBtn.disabled = true;
            status.innerText    = 'DEVELOPING FILM...';
            triggerFlash();

            // Nhỏ delay để flash animation chạy trước khi block JS
            await new Promise(r => setTimeout(r, 60));

            // Kích thước canvas = độ phân giải thực của video stream
            canvas.width  = video.videoWidth  || 1280;
            canvas.height = video.videoHeight || 720;

            // Vẽ frame hiện tại lên canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // ── Vintage color grade ──
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data      = imageData.data;

            // Bước 1: warmth (Đỏ ↑, Xanh dương ↓) + faded highlight
            for (let i = 0; i < data.length; i += 4) {
                // Warmth
                data[i]     = Math.min(255, data[i]     * 1.12);
                data[i + 1] = Math.min(255, data[i + 1] * 1.04);
                data[i + 2] = data[i + 2] * 0.82;

                // Fade highlights nhẹ (lifted black — đặc trưng của film)
                data[i]     = Math.min(255, data[i]     * 0.92 + 14);
                data[i + 1] = Math.min(255, data[i + 1] * 0.92 + 10);
                data[i + 2] = Math.min(255, data[i + 2] * 0.92 + 8);
            }

            // Bước 2: S-curve contrast
            applySCurve(data, sCurveLUT);

            // Bước 3: film grain
            applyFilmGrain(data, 30);

            ctx.putImageData(imageData, 0, 0);

            // Bước 4: vignette (vẽ đè lên canvas sau putImageData)
            applyVignette(canvas.width, canvas.height);

            // ── Date stamp ──
            const now = new Date();
            const yy  = String(now.getFullYear()).slice(-2);
            const mm  = String(now.getMonth() + 1).padStart(2, '0');
            const dd  = String(now.getDate()).padStart(2, '0');
            const dateString = `'${yy} ${mm} ${dd}`;

            const fontSize = Math.floor(canvas.width * 0.04);
            ctx.font        = `bold ${fontSize}px "Courier New", monospace`;
            ctx.fillStyle   = '#ff6600';
            ctx.shadowColor = '#ff3300';
            ctx.shadowBlur  = fontSize * 0.25;

            const textWidth = ctx.measureText(dateString).width;
            const posX      = canvas.width  - textWidth - canvas.width  * 0.04;
            const posY      = canvas.height - canvas.height * 0.04;
            ctx.fillText(dateString, posX, posY);
            ctx.shadowBlur = 0; // reset shadow

            // ── Hiển thị preview ──
            canvas.toBlob(async (blob) => {
                if (!blob) {
                    status.innerText    = 'ERROR: COULD NOT DEVELOP';
                    captureBtn.disabled = false;
                    return;
                }

                const filename = `RETRO_${Date.now()}.jpg`;
                const url      = URL.createObjectURL(blob);

                preview.src            = url;
                preview.style.display  = 'block';
                isReviewing            = true;

                photoCount++;
                counterEl.innerText    = String(photoCount).padStart(2, '0');
                status.innerText       = 'SAVED! TAP SHUTTER TO SHOOT AGAIN';
                captureBtn.textContent = '🔄 NEXT FILM';
                captureBtn.disabled    = false;

                // FIX 5: lưu ảnh qua Share API (Android) hoặc download (PC)
                await savePhoto(blob, filename);

                // FIX 6: giải phóng object URL sau khi preview không cần nữa
                preview.addEventListener('load', () => {
                    // giữ url để preview hiển thị, revoke sau khi next shot
                }, { once: true });

            }, 'image/jpeg', 0.92);
        });

        // FIX 6: dừng camera stream khi thoát trang (giải phóng tài nguyên, tiết kiệm pin)
        window.addEventListener('beforeunload', () => {
            if (activeStream) {
                activeStream.getTracks().forEach(track => track.stop());
            }
        });

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
